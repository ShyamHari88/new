<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link rel="icon" type="image/png" href="/easy-attendance-logo.png" />

  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#2563eb" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- iOS PWA Support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="ClassConnect" />
  <link rel="apple-touch-icon" href="/easy-attendance-logo.png" />

  <!-- App Info -->
  <title>ClassConnect – Student Portal</title>
  <meta name="description" content="Attendance and Marks Management System for students, teachers and advisors." />
  <meta name="author" content="ClassConnect" />

  <!-- Open Graph -->
  <meta property="og:title" content="ClassConnect" />
  <meta property="og:description" content="Efficiency-focused attendance and marks tracking" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/easy-attendance-logo.png" />

  <meta name="twitter:card" content="summary" />
</head>

<body>
  <div id="root"></div>
  <script>
    window.addEventListener('error', function(e) {
      const errorDiv = document.createElement('div');
      errorDiv.style.cssText = 'position:fixed;top:0;left:0;right:0;background:red;color:white;padding:20px;z-index:9999;font-weight:bold;';
      errorDiv.innerHTML = '<h2>Uncaught Error!</h2><p>' + e.message + '</p><pre>' + (e.error && e.error.stack) + '</pre>';
      document.body.appendChild(errorDiv);
    });
    window.addEventListener('unhandledrejection', function(e) {
      const errorDiv = document.createElement('div');
      errorDiv.style.cssText = 'position:fixed;top:0;left:0;right:0;background:orange;color:white;padding:20px;z-index:9999;font-weight:bold;';
      errorDiv.innerHTML = '<h2>Unhandled Promise Rejection!</h2><p>' + e.reason + '</p>';
      document.body.appendChild(errorDiv);
    });
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
